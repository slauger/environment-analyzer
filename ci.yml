schemaVersion: v0.2
prepare:
  steps:
    - name: setup node
      command: nix-env -iA nixpkgs.nodejs_22
    - name: install dependencies
      command: nix-shell -p nodejs_22 --run "npm ci"
test:
  steps: []
run:
  app:
    steps:
      - name: start application
        command: nix-shell -p nodejs_22 --run "HOST=0.0.0.0 PORT=3000 node server.js"
    plan: 8
    replicas: 1
    isPublic: true
    network:
      path: /
      stripPath: false
