schemaVersion: v0.2
prepare:
  steps:
    - name: setup node
      command: sudo n latest stable
    - name: install dependencies
      command: npm ci
test:
  steps: []
run:
  pytest:
    steps:
      - name: python http server
        command: python3 -m http.server 3000 --bind 0.0.0.0
    plan: 201
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: false
  app:
    steps:
      - name: start application
        command: HOST=0.0.0.0 PORT=3000 node server.js
    plan: 201
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: true
      paths:
        - port: 3000
          path: /
    env: {}
