schemaVersion: v0.2
prepare:
  steps:
    - name: setup node
      command: sudo n latest stable
    - name: install dependencies
      command: npm ci
test:
  steps: []
run:
  app:
    steps:
      - name: start application
        command: HOST=0.0.0.0 PORT=3000 node server.js
    plan: 8
    replicas: 1
    isPublic: true
    network:
      path: /
