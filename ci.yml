schemaVersion: v0.2
prepare:
  steps:
    - name: install dependencies
      command: npm ci
test:
  steps: []
run:
  app:
    steps:
      - name: start application
        command: echo "node=$(which node) version=$(node --version) PORT=$PORT" && node server.js
    plan: 8
    replicas: 1
    isPublic: true
    network:
      path: /
      stripPath: false
