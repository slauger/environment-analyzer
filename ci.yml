schemaVersion: v0.2
prepare:
  steps:
    - name: install dependencies
      command: npm ci
test:
  steps: []
run:
  app:
    steps:
      - name: start application
        command: curl -sI http://archive.ubuntu.com/ubuntu/dists/noble-security/main/binary-amd64/Packages.gz | head -5 && node server.js
    plan: 8
    replicas: 1
    isPublic: true
    network:
      path: /
      stripPath: false
